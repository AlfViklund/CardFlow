services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: cardflow
      POSTGRES_PASSWORD: cardflow
      POSTGRES_DB: cardflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: cardflow
      MINIO_ROOT_PASSWORD: cardflowsecret
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
